# RotatE on FB15k-237 — Sun et al. 2019 recipe, paper-comparable (target MRR ~0.338).
# Relations are rotations in complex space (captures symmetry/inversion/composition),
# trained with self-adversarial negative sampling (NSSA). The canonical config uses a
# LARGE dim (1000), MANY negatives (256), and a SMALL Adam lr (5e-5) over many steps.
name: rotate_fb15k237
model: RotatE
random_seed: 42

model_kwargs:
  embedding_dim: 1000           # complex dim (= 2000 reals), per Sun et al.

training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 256         # Sun et al. use 256 self-adversarial negatives

# Self-adversarial NSSA: weight each fake by how believable the model currently finds
# it (adversarial_temperature), and open a margin gamma between true and fake.
loss: nssa
loss_kwargs:
  margin: 9.0
  adversarial_temperature: 1.0

optimizer: Adam
optimizer_kwargs:
  lr: 5.0e-5                     # small lr; needs many epochs (Sun: ~100k steps)

training_kwargs:
  num_epochs: 500               # ~100k+ steps at batch 1024; early stopping cuts it
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 10
  patience: 6
  relative_delta: 0.001
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, rotate, fb15k237]
