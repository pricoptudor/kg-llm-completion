# RotatE on FB15k-237 — dim 256, self-adversarial NSSA (reported: 0.324).
# Strongest of the four and essentially matches the published 0.338 at this dim.
name: rotate_fb15k237
model: RotatE
random_seed: 42

model_kwargs:
  embedding_dim: 256

training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 128

loss: nssa
loss_kwargs:
  margin: 9.0
  adversarial_temperature: 1.0

optimizer: Adam
optimizer_kwargs:
  lr: 0.0005

training_kwargs:
  num_epochs: 150
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, rotate, fb15k237]
