# QuatE on FB15k-237 — starting config (tune from here).
# QuatE generalizes ComplEx from complex numbers to quaternions (4 components per
# coordinate instead of 2). This is the one that connects directly to your PhD's
# Clifford-algebra direction, so it's worth getting a clean number here.
name: quate_fb15k237
model: QuatE
random_seed: 42

model_kwargs:
  embedding_dim: 256   # quaternion dim; QuatE stores 4 real numbers per coordinate

# Same dense classification setup as ComplEx (its closest relative), with the
# size-pressure regularizer QuatE also relies on.
# Inverse triples for the same reason as ComplEx: LCWA trains tails only, so we
# add each relation's inverse to also train head prediction.
create_inverse_triples: true
training_loop: lcwa
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, quate, fb15k237]
