# QuatE on FB15k-237 — LCWA (1-vs-all) + inverse triples, dim 256 (reported: 0.304).
# QuatE generalizes ComplEx to quaternions; connects to the PhD's Clifford-algebra
# spine. PyKEEN's QuatE rejects a generic `regularizer` kwarg (normalizes internally),
# so no N3 here.
name: quate_fb15k237
model: QuatE
random_seed: 42

model_kwargs:
  embedding_dim: 256

create_inverse_triples: true

training_loop: lcwa
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, quate, fb15k237]
