# QuatE on FB15k-237 — LCWA (1-vs-all) + inverse triples, bumped dim.
# QuatE generalizes ComplEx to quaternions (4 components/coordinate) and connects to
# the PhD's Clifford-algebra spine. HONEST CAVEAT: QuatE's best published FB15k-237
# (~0.366) needs N3 regularization + reciprocal ("QuatE2"), but PyKEEN's QuatE raises
# TypeError on a generic `regularizer` kwarg (it normalizes internally), so we cannot
# add N3 here. With dim + LCWA + inverse we expect ~0.31-0.33 — documented as a
# framework limitation, not a tuning failure.
name: quate_fb15k237
model: QuatE
random_seed: 42

model_kwargs:
  embedding_dim: 200            # quaternion dim; 4 reals per coordinate => 800 reals

create_inverse_triples: true

training_loop: lcwa
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

training_kwargs:
  num_epochs: 300
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 10
  patience: 5
  relative_delta: 0.001
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, quate, fb15k237]
