# QuatE on FB15k-237 — starting config (tune from here).
# QuatE generalizes ComplEx from complex numbers to quaternions (4 components per
# coordinate). This is the one that connects to your PhD's Clifford-algebra spine.
name: quate_fb15k237
model: QuatE
random_seed: 42

model_kwargs:
  embedding_dim: 256   # quaternion dim; 4 real numbers per coordinate

# sLCWA for the same reason as ComplEx: train both directions via negative sampling
# rather than LCWA + inverse triples (which renumbers relations and breaks our
# PyKEENScorer adapter / cross-check).
training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 50

loss: softplus

optimizer: Adam
optimizer_kwargs:
  lr: 0.001

regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, quate, fb15k237]
