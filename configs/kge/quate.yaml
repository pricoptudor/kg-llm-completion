# QuatE on FB15k-237 — LCWA (1-vs-all) + inverse triples (same regime as ComplEx).
# QuatE generalizes ComplEx to quaternions (4 components/coordinate) and connects
# to your PhD's Clifford-algebra spine.
name: quate_fb15k237
model: QuatE
random_seed: 42

model_kwargs:
  embedding_dim: 256   # quaternion dim; 4 real numbers per coordinate

# Inverse triples for the same reason as ComplEx: LCWA trains tails only, so we add
# each relation's inverse to also train head prediction. Renumbers relations inside
# PyKEEN -> report PyKEEN's metrics; cross-check defers to PyKEEN for inverse models.
create_inverse_triples: true

training_loop: lcwa
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

# NOTE: PyKEEN's QuatE does NOT accept a generic `regularizer` kwarg (it raises
# TypeError: unexpected keyword argument 'regularizer'). QuatE applies its own
# normalization internally, so we omit the Lp block that ComplEx uses.
training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, quate, fb15k237]
