# ComplEx on FB15k-237 — LCWA (1-vs-all) + inverse triples.
# This is ComplEx's strong, sample-efficient regime: every step scores ALL entities
# as candidate tails (~14.5k implicit negatives per positive), so it converges far
# faster than sampling a few fakes. We measured this directly on this project:
# sLCWA(50 negs) gave MRR ~0.08, LCWA-tail-only ~0.14, LCWA+inverse ~0.22 — same
# model/dim/epochs. (That comparison is a writeup finding on 1-vs-all efficiency.)
name: complex_fb15k237
model: ComplEx
random_seed: 42

model_kwargs:
  embedding_dim: 256   # complex dim; real+imag => 512 reals/entity

# Inverse triples: also learn each relation's inverse so HEAD prediction is trained
# too (LCWA alone trains tails only -> head-side MRR collapses).
# NOTE: this renumbers relations inside PyKEEN, so our PyKEENScorer cannot drive
# this model. That's fine: we report PyKEEN's own filtered metrics for KGE, and our
# harness is validated separately on the non-inverse config. The cross-check script
# detects inverse models and defers to PyKEEN automatically.
create_inverse_triples: true

training_loop: lcwa
loss: crossentropy   # the all-entity classification loss that pairs with LCWA

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

# Size-pressure regularizer (p=3 ~ N3, Lacroix 2018) so ComplEx generalizes.
regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, complex, fb15k237]
