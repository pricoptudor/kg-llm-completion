# ComplEx on FB15k-237 — LCWA (1-vs-all) + inverse triples, dim 256.
# This is the REPORTED baseline (test MRR 0.222). ComplEx is dim-hungry: a dim-1000
# N3 run reached 0.29 but was still climbing at 1000 epochs (~2h) and never converged
# — kept as a documented "dim-hunger" data point, not the headline. The dim-256 set
# is reported because all four KGE models share one dim/protocol (fair comparison).
name: complex_fb15k237
model: ComplEx
random_seed: 42

model_kwargs:
  embedding_dim: 256   # complex dim; real+imag => 512 reals/entity

create_inverse_triples: true

training_loop: lcwa
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, complex, fb15k237]
