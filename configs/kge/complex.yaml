# ComplEx on FB15k-237 — Lacroix et al. 2018 (N3) recipe, paper-comparable.
# Strong regime: high dim + 1-vs-all (LCWA cross-entropy, ~14.5k implicit negatives
# per step) + reciprocal (inverse) relations + the weighted 3-norm (N3) regularizer,
# optimized with Adagrad. Original paper: dim 2000 -> MRR 0.36 / H@10 0.56. We use
# dim 1000 as a strong, cheaper point (~0.34-0.36 expected). The sensitive knobs are
# the Adagrad lr (0.5) and the N3 weight (5e-2) — calibrate ComplEx first.
name: complex_fb15k237
model: ComplEx
random_seed: 42

model_kwargs:
  embedding_dim: 1000           # complex dim; real+imag => 2000 reals/entity
  entity_initializer: xavier_uniform_
  relation_initializer: xavier_uniform_

# Reciprocal relations: Lacroix trains both directions, so head prediction is learned
# too (LCWA alone trains tails only). Renumbers relations inside PyKEEN -> we report
# PyKEEN's own filtered metrics; the cross-check defers to PyKEEN for inverse models.
create_inverse_triples: true

training_loop: lcwa
loss: crossentropy              # full multiclass softmax that pairs with LCWA / N3

optimizer: Adagrad              # Lacroix's optimizer (NOT Adam) — pairs with N3
optimizer_kwargs:
  lr: 0.5

# N3 = weighted 3-norm size pressure (Lp with p=3). This is THE regularizer behind
# ComplEx's strong FB15k-237 numbers.
regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 5.0e-2

training_kwargs:
  num_epochs: 1000              # early stopping will cut this well short
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 10
  patience: 5
  relative_delta: 0.001
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, complex, fb15k237]
