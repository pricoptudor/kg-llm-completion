# ComplEx on FB15k-237 — starting config (a sane baseline to tune from, not the
# final tuned recipe). Every knob is annotated against the training theory.
name: complex_fb15k237
model: ComplEx
random_seed: 42

model_kwargs:
  # Size of each entity/relation vector. ComplEx vectors are complex numbers
  # (a real + an imaginary part), so 256 here means 512 real numbers per entity.
  embedding_dim: 256

# HOW we feed the model. "lcwa" = instead of sampling a few fake tails, for each
# (head, relation) we score EVERY entity as a candidate tail at once and treat the
# known-true ones as the positives. Denser learning signal; it's ComplEx's happy
# place. (The alternative, "slcwa", is the sample-a-few-fakes style — we'll use
# that for RotatE, which is built around the hard-fakes idea.)
training_loop: lcwa

# The loss = the classification style from the theory: turn scores into
# true/false probabilities and punish wrong confidence (cross-entropy).
loss: crossentropy

optimizer: Adam
optimizer_kwargs:
  lr: 0.005

# Regularization: the gentle downward pressure on vector size that stops ComplEx
# from memorizing. p=3 is the "N3" regularizer (Lacroix et al. 2018) that ComplEx
# needs to reach its published ~0.32 MRR. Tune `weight` if it over/under-fits.
regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

# Early stopping: check validation MRR every 5 epochs; if it hasn't improved
# meaningfully for 3 checks in a row, stop and keep the BEST checkpoint, not the
# last. (metric name is PyKEEN's internal name for MRR.)
stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

# Weights & Biases logging. Set the whole block to null to disable.
wandb:
  project: kg-llm-completion
  tags: [phase1, kge, complex, fb15k237]
