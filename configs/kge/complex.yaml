# ComplEx on FB15k-237 — starting config (tune from here).
# This is the ORIGINAL ComplEx recipe (Trouillon et al. 2016): negative sampling
# with a logistic (softplus) loss. We deliberately use sLCWA, not LCWA — see the
# note below — so the model trains BOTH head and tail prediction natively, with no
# inverse-relation augmentation (which renumbers relations and breaks our adapter).
name: complex_fb15k237
model: ComplEx
random_seed: 42

model_kwargs:
  # Complex vectors store a real + imaginary part, so 256 here = 512 reals/entity.
  embedding_dim: 256

# WHY sLCWA and not LCWA: LCWA only ever trains tail prediction, so head-side MRR
# collapses. The usual LCWA fix is inverse triples — but that augments the relation
# set, renumbers relation IDs, and is INCOMPATIBLE with our PyKEENScorer (which
# drives the model with our exact relation IDs). sLCWA samples fake heads AND tails,
# so the model learns both directions and our eval harness / cross-check stay valid.
training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 50   # 50 sampled fakes per true triple

# Logistic loss (the classification style): push true scores up, sampled-fake
# scores down. This is the loss paired with sLCWA; `crossentropy` is for LCWA only.
loss: softplus

optimizer: Adam
optimizer_kwargs:
  lr: 0.001

# Size-pressure regularizer (p=3 ~ the N3 of Lacroix 2018) so ComplEx generalizes
# rather than memorizing. Tune `weight` if it over/under-fits.
regularizer: lp
regularizer_kwargs:
  p: 3
  weight: 1.0e-5

training_kwargs:
  num_epochs: 100
  batch_size: 1024

# Check validation MRR every 5 epochs; stop after 3 checks without real improvement
# and keep the BEST checkpoint, not the last.
stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, complex, fb15k237]
