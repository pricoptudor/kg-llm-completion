# TransE on FB15k-237 — Sun et al. 2019 self-adversarial regime (target MRR ~0.30-0.33).
# TransE is the translation model: head + relation ~= tail. Its strong FB15k-237
# numbers come from the SAME self-adversarial setup as RotatE (NSSA + 256 negatives +
# large dim), not the classic margin-ranking loss. (We deliberately switched from
# marginranking to NSSA here to push it toward paper strength.)
name: transe_fb15k237
model: TransE
random_seed: 42

model_kwargs:
  embedding_dim: 1000
  scoring_fct_norm: 1           # L1 distance between (head+relation) and tail

training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 256

loss: nssa
loss_kwargs:
  margin: 9.0
  adversarial_temperature: 1.0

optimizer: Adam
optimizer_kwargs:
  lr: 1.0e-4

training_kwargs:
  num_epochs: 500
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 10
  patience: 6
  relative_delta: 0.001
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, transe, fb15k237]
