# TransE on FB15k-237 — dim 256, margin-ranking + sampled negatives (reported: 0.289).
name: transe_fb15k237
model: TransE
random_seed: 42

model_kwargs:
  embedding_dim: 256
  scoring_fct_norm: 1

training_loop: slcwa
negative_sampler: basic
negative_sampler_kwargs:
  num_negs_per_pos: 32

loss: marginranking
loss_kwargs:
  margin: 5.0

optimizer: Adam
optimizer_kwargs:
  lr: 0.0005

training_kwargs:
  num_epochs: 100
  batch_size: 1024

stopper: early
stopper_kwargs:
  frequency: 5
  patience: 3
  relative_delta: 0.002
  metric: inverse_harmonic_mean_rank

wandb:
  project: kg-llm-completion
  tags: [phase1, kge, transe, fb15k237]
