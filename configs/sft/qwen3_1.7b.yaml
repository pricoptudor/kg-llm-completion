# SFT (QLoRA) for Qwen3-1.7B on FB15k-237 — starting config.
name: qwen3_1.7b_sft_fb15k237
model: Qwen/Qwen3-1.7B

# null = full train split (~272k triples -> ~544k examples). Set small (e.g. 200)
# for a smoke run that validates the whole pipeline in a couple of minutes.
max_triples: null

# LoRA adapter: train only these low-rank matrices, base stays frozen + 4-bit.
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]   # attention projections

train:
  batch_size: 8          # per-device; 4-bit 1.7B at seq 256 fits a T4
  grad_accum: 4          # effective batch = 8 * 4 = 32
  lr: 2.0e-4             # LoRA tolerates a higher LR than full fine-tuning
  epochs: 1
  max_length: 256        # KG prompts are short; 256 is plenty

wandb:
  project: kg-llm-completion
  tags: [phase1, sft, qwen3-1.7b, fb15k237]
