# SFT (QLoRA) for Qwen3-1.7B on FB15k-237 — starting config.
name: qwen3_1.7b_sft_fb15k237
model: Qwen/Qwen3-1.7B

# Subsample of train triples (each -> 2 examples). With Unsloth (~2x) + batch 16 +
# fp16 re-enabled, 50k triples (=100k examples, 1 epoch) should train in ~2-3h on a
# T4. Use the SAME value across model sizes for a fair scaling comparison. Check the
# ETA after it starts and lower this if a session won't cover it. (--max-triples overrides.)
max_triples: 50000

# LoRA adapter: train only these low-rank matrices, base stays frozen + 4-bit.
lora:
  r: 16
  alpha: 32
  dropout: 0.0           # 0 enables Unsloth's fast LoRA path
  target_modules: [q_proj, k_proj, v_proj, o_proj]   # attention projections

train:
  batch_size: 32         # smoke used only 2.4/16GB at batch 16, so 32 is safe (effective batch
  grad_accum: 1          # stays 32). 0.6B/1.7B can go higher (48-64) — watch the GPU monitor.
  lr: 2.0e-4             # LoRA tolerates a higher LR than full fine-tuning
  epochs: 1
  max_length: 128        # KG prompt+answer fits well under 128; ~halves compute/step vs 256
  packing: false         # TRIED, REVERTED: packing here needs flash-attn (unavailable on
                         # T4) to separate samples. Without it, samples cross-contaminate
                         # (token-acc 0.583 vs 0.656) AND it's slower (1.8 vs 3.0 samp/s).

wandb:
  project: kg-llm-completion
  tags: [phase1, sft, qwen3-1.7b, fb15k237]
