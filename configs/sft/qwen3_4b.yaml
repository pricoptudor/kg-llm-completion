# SFT (QLoRA) for Qwen3-4b on FB15k-237 — capable GPU (bf16), offline.
# Override the base with --model <local Kaggle-Model path> for the offline GPU run.
name: qwen3_4b_sft_fb15k237
model: Qwen/Qwen3-4B

# Full train split (272k triples -> 544k both-direction examples). The RTX Pro 6000
# trains a full bf16 epoch fast. Use --max-triples 200 for a smoke run.
max_triples: null

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]

train:
  batch_size: 32          # effective batch 32 (grad_accum 1); same across sizes for a fair scaling axis
  grad_accum: 1
  lr: 2.0e-4
  epochs: 1
  max_length: 128
  gradient_checkpointing: false   # plenty of VRAM; off = faster. Set true if a big model/batch OOMs.

wandb:
  project: kg-llm-completion
  tags: [phase1, sft, qwen3-4b, fb15k237]
